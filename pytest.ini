[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --html=tests/report.html
    --self-contained-html
markers =
    auth: Authentication flow tests
    footer: Footer presence and theme sync tests
    calculator: Calculator module navigation tests
    subscribe: Subscription and paywall tests
    legal: Legal page (Terms, Privacy Policy) tests
    responsive: Responsive layout and accessibility tests
